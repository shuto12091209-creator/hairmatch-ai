services:
  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: hairmatch-web
    ports:
      - "80:80"
    volumes:
      - ./app:/var/www/html
      - ./python:/var/www/python
    depends_on:
      - db
  db:
    image: mysql:8.0
    container_name: hairmatch-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hairmatch
      MYSQL_USER: hairmatch
      MYSQL_PASSWORD: hairmatch
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data: